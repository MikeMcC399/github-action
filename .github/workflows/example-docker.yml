name: example-docker
on:
  push:
    branches:
      - 'master'
  pull_request:
  workflow_dispatch:

jobs:
  docker-browsers:
    runs-on: ubuntu-24.04
    container:
      image: node:26.1.0-trixie
      options: --user 1001
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Cypress tests
        uses: ./ # if copying, replace with cypress-io/github-action@v7
        with:
          working-directory: examples/basic
