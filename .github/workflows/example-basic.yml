name: example-basic
# This workflow represents a set of basic End-to-End tests
on:
  workflow_dispatch:

jobs:

  basic-ubuntu-24:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress tests
        uses: ./
        with:
          working-directory: examples/basic
          build: npx cypress info

  basic-ubuntu-24-debug:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress tests
        uses: ./
        with:
          working-directory: examples/basic
          build: npx cypress info
        env:
          DEBUG: 'cypress:*'
